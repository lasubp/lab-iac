---
- name: Configure OPNsense from Terraform outputs
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    terraform_output_path: "{{ playbook_dir }}/../generated/terraform-output.json"
    opnsense_vars_file: "{{ playbook_dir }}/../vars/opnsense.yml"

  pre_tasks:
    - name: Check that the Terraform output export exists
      ansible.builtin.stat:
        path: "{{ terraform_output_path }}"
      register: terraform_output_file

    - name: Check that the OPNsense vars file exists
      ansible.builtin.stat:
        path: "{{ opnsense_vars_file }}"
      register: opnsense_vars_file_stat

    - name: Require exported Terraform outputs and OPNsense vars
      ansible.builtin.assert:
        that:
          - terraform_output_file.stat.exists
          - opnsense_vars_file_stat.stat.exists
        fail_msg: >-
          Expected {{ terraform_output_path }} and {{ opnsense_vars_file }}.
          Run scripts/export-terraform-outputs.sh and copy ansible/vars/opnsense.yml.example to ansible/vars/opnsense.yml first.

    - name: Load Terraform outputs
      ansible.builtin.set_fact:
        terraform_outputs: "{{ lookup('file', terraform_output_path) | from_json }}"

    - name: Load OPNsense operator vars
      ansible.builtin.include_vars:
        file: "{{ opnsense_vars_file }}"

    - name: Derive topology facts from Terraform outputs
      ansible.builtin.set_fact:
        lab_networks: "{{ terraform_outputs.network_summary.value }}"
        terraform_dns_servers: "{{ terraform_outputs.dns_servers.value }}"
        terraform_searchdomain: "{{ terraform_outputs.searchdomain.value }}"
        network_names: "{{ terraform_outputs.network_summary.value.keys() | list | sort }}"
        hub_network_name: "{{ (terraform_outputs.network_summary.value.keys() | list | sort)[0] }}"

    - name: Build default OPNsense interface mapping
      ansible.builtin.set_fact:
        default_interface_map: "{{ default_interface_map | default({}) | combine({ item: ('lan' if idx == 0 else 'opt' ~ idx) }) }}"
      loop: "{{ network_names }}"
      loop_control:
        index_var: idx

    - name: Resolve final OPNsense interface mapping
      ansible.builtin.set_fact:
        resolved_interface_map: "{{ opnsense_interface_map | default(default_interface_map) }}"

    - name: Render desired OPNsense state from Terraform outputs
      ansible.builtin.set_fact:
        opnsense_desired_state: "{{ lookup('template', playbook_dir ~ '/../templates/opnsense_desired_state.yml.j2') | from_yaml }}"

    - name: Validate operator inputs
      ansible.builtin.assert:
        that:
          - opnsense_api_url is string
          - opnsense_api_key is string
          - opnsense_api_secret is string
          - opnsense_desired_state.network_names | length > 0
        fail_msg: "Missing API connection details or lab topology inputs."

  tasks:
    - name: Configure Kea DHCPv4 general settings
      ansible.builtin.uri:
        url: "{{ opnsense_api_url }}/api/kea/dhcpv4/set"
        method: POST
        user: "{{ opnsense_api_key }}"
        password: "{{ opnsense_api_secret }}"
        force_basic_auth: true
        validate_certs: "{{ opnsense_validate_certs }}"
        return_content: true
        status_code: 200
        body_format: json
        headers:
          Accept: "application/json"
        body:
          dhcpv4:
            general:
              enabled: "1"
              interfaces: "{{ opnsense_desired_state.kea_interfaces }}"
              valid_lifetime: "{{ opnsense_kea_valid_lifetime | string }}"
              fwrules: "{{ '1' if opnsense_kea_auto_firewall_rules else '0' }}"
              dhcp_socket_type: "{{ opnsense_kea_socket_type }}"
      register: kea_general_result

    - name: Verify Kea general settings were accepted
      ansible.builtin.assert:
        that:
          - kea_general_result.json.result | default('saved') in ['saved', 'ok']
        fail_msg: "Kea general settings were not accepted by OPNsense: {{ kea_general_result.json }}"

    - name: Upsert Kea subnets
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/manage_kea_subnet.yml"
      loop: "{{ opnsense_desired_state.desired_subnets }}"
      loop_control:
        label: "{{ item.subnet }}"

    - name: Reconfigure Kea service
      ansible.builtin.uri:
        url: "{{ opnsense_api_url }}/api/kea/service/reconfigure"
        method: POST
        user: "{{ opnsense_api_key }}"
        password: "{{ opnsense_api_secret }}"
        force_basic_auth: true
        validate_certs: "{{ opnsense_validate_certs }}"
        return_content: true
        status_code: 200
        body_format: json
        headers:
          Accept: "application/json"
      register: kea_reconfigure_result

    - name: Verify Kea service reconfigure succeeded
      ansible.builtin.assert:
        that:
          - >
            (
              kea_reconfigure_result.json.result
              | default(kea_reconfigure_result.json.status | default('ok'))
              | string
              | lower
            ) is search('ok|saved')
        fail_msg: "Kea service reconfigure failed: {{ kea_reconfigure_result.json }}"

    - name: Create a firewall savepoint before rule changes
      ansible.builtin.uri:
        url: "{{ opnsense_api_url }}/api/firewall/filter/savepoint"
        method: POST
        user: "{{ opnsense_api_key }}"
        password: "{{ opnsense_api_secret }}"
        force_basic_auth: true
        validate_certs: "{{ opnsense_validate_certs }}"
        return_content: true
        status_code: 200
        body_format: json
        headers:
          Accept: "application/json"
      register: firewall_savepoint_result

    - name: Verify firewall savepoint was created
      ansible.builtin.assert:
        that:
          - firewall_savepoint_result.json.revision is defined
        fail_msg: "Firewall savepoint did not return a revision: {{ firewall_savepoint_result.json }}"

    - name: Upsert firewall rules
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/manage_firewall_rule.yml"
      loop: "{{ opnsense_desired_state.desired_rules }}"
      loop_control:
        label: "{{ item.description }}"

    - name: Apply firewall changes with rollback safety
      ansible.builtin.uri:
        url: "{{ opnsense_api_url }}/api/firewall/filter/apply/{{ firewall_savepoint_result.json.revision }}"
        method: POST
        user: "{{ opnsense_api_key }}"
        password: "{{ opnsense_api_secret }}"
        force_basic_auth: true
        validate_certs: "{{ opnsense_validate_certs }}"
        return_content: true
        status_code: 200
        body_format: json
        headers:
          Accept: "application/json"
      register: firewall_apply_result

    - name: Verify firewall apply succeeded
      ansible.builtin.assert:
        that:
          - >
            (
              firewall_apply_result.json.status
              | default(firewall_apply_result.json.result | default('ok'))
              | string
              | lower
            ) is search('ok')
        fail_msg: "Firewall apply failed: {{ firewall_apply_result.json }}"

    - name: Cancel firewall rollback after successful apply
      ansible.builtin.uri:
        url: "{{ opnsense_api_url }}/api/firewall/filter/cancelRollback/{{ firewall_savepoint_result.json.revision }}"
        method: POST
        user: "{{ opnsense_api_key }}"
        password: "{{ opnsense_api_secret }}"
        force_basic_auth: true
        validate_certs: "{{ opnsense_validate_certs }}"
        return_content: true
        status_code: 200
        body_format: json
        headers:
          Accept: "application/json"
      register: firewall_cancel_result

    - name: Verify firewall rollback cancellation succeeded
      ansible.builtin.assert:
        that:
          - >
            (
              firewall_cancel_result.json.status
              | default(firewall_cancel_result.json.result | default('ok'))
              | string
              | lower
            ) is search('ok')
        fail_msg: "Firewall rollback cancellation failed: {{ firewall_cancel_result.json }}"

    - name: Show final OPNsense apply summary
      ansible.builtin.debug:
        msg:
          - "Configured Kea on interfaces: {{ opnsense_desired_state.kea_interfaces | join(', ') }}"
          - "Configured subnets: {{ opnsense_desired_state.desired_subnets | map(attribute='subnet') | join(', ') }}"
          - "Configured firewall rules: {{ opnsense_desired_state.desired_rules | map(attribute='description') | join('; ') }}"
